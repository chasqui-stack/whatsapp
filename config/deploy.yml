# Name of your application. Used to uniquely configure containers.
service: psicolab-whatsapp

# Name of the container image.
image: willywg/psicolab-whatsapp

# Deploy to these servers.
servers:
  web:
    hosts:
      - 34.134.60.186

registry:
  username: willywg
  password:
    - DOCKER_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
# Remember to run `kamal env push` after making changes!
env:
  clear:
    PORT: 8000
  secret:
    - WA_PHONE_ID
    - WA_TOKEN
    - WA_VERIFY_TOKEN
    - WA_APP_ID
    - WA_APP_SECRET
    - WA_WABA_ID
    # --- WhatsApp Flow IDs ---
    - FLOW_ID_GAD7
    - FLOW_ID_PHQ9
    - FLOW_ID_WHO5
    - FLOW_ID_PSS10
    - FLOW_ID_MBI
    - FLOW_ID_CSAT
    - FLOW_ID_ENPS
    - FLOW_ID_PSC4
    # --- Backend API ---
    - BACKEND_URL
    - BACKEND_API_KEY
    # --- Sentry ---
    - SENTRY_DSN

ssh:
  user: willywg

builder:
  arch: amd64

proxy:
  ssl: true
  host: "wsp.psicohelp.ai"
  app_port: 8000
  healthcheck:
    path: /health

aliases:
  apps: server exec docker exec kamal-proxy kamal-proxy list
  stats: server exec "docker stats --no-stream"
  ps: server exec "docker ps"
  logs: app logs -f
